version: 2

project_name: lazyterra

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/lazyterra/
    binary: lazyterra
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: NikitaForGit
      name: homebrew-lazyterra
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/NikitaForGit/LazyTerra"
    description: "A lazygit-inspired TUI for Terragrunt"
    license: "MIT"
    test: |
      system "#{bin}/lazyterra", "--version"
    install: |
      bin.install "lazyterra"
